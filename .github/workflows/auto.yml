name: Daily Builder

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Build file
        run: |
          mkdir -p builds
          echo "Build generated at $(date)" > builds/build-$(date +%Y-%m-%d).txt

      - name: Commit
        run: |
          git config --global user.name "KannurAnudeepRaj"
          git config --global user.email "KannurAnudeepRaj@gmail.com"
          git add .
          git commit -m "Daily build $(date)" || echo "No change"
          git push
